<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Downloader</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1e1e1e; padding: 30px; border-radius: 15px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        h1 { color: #ff0000; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: none; background: #333; color: white; box-sizing: border-box; outline: none; }
        .btn-group { display: flex; gap: 10px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .mp4 { background: #ff0000; color: white; }
        .mp3 { background: #444; color: white; }
        #status { margin-top: 20px; font-size: 14px; }
        .loader { display: none; border: 3px solid #f3f3f3; border-top: 3px solid #ff0000; border-radius: 50%; width: 25px; height: 25px; animation: spin 1s linear infinite; margin: 15px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .dl-link { display: inline-block; margin-top: 15px; padding: 10px 20px; background: #28a745; color: white; text-decoration: none; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h1>YT Downloader</h1>
        <input type="text" id="url" placeholder="Paste YouTube link here...">
        <div class="btn-group">
            <button class="mp4" onclick="startDownload('mp4')">Video (MP4)</button>
            <button class="mp3" onclick="startDownload('mp3')">Audio (MP3)</button>
        </div>
        <div class="loader" id="loader"></div>
        <div id="status"></div>
    </div>

    <script>
        async function startDownload(mode) {
            const url = document.getElementById('url').value;
            const status = document.getElementById('status');
            const loader = document.getElementById('loader');

            if(!url) return alert("Please enter a link!");

            status.innerHTML = "Processing...";
            loader.style.display = "block";

            try {
                const response = await fetch('/download', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ url: url, mode: mode })
                });
                const result = await response.json();
                if(result.success) {
                    status.innerHTML = `<a href="${result.download_url}" target="_blank" class="dl-link">Download File</a>`;
                } else {
                    status.innerHTML = "Error: " + result.error;
                }
            } catch (err) {
                status.innerHTML = "Server Error!";
            } finally {
                loader.style.display = "none";
            }
        }
    </script>
</body>
</html>
