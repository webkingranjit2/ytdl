<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Video Downloader</title>
    <style>
        :root { --primary: #ff0000; --bg: #0c0c0c; --card: #181818; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 15px; }
        .card { background: var(--card); padding: 30px; border-radius: 20px; width: 100%; max-width: 420px; text-align: center; border: 1px solid #282828; box-shadow: 0 15px 35px rgba(0,0,0,0.7); }
        h2 { color: var(--primary); font-size: 26px; margin-bottom: 5px; }
        p { color: #888; font-size: 14px; margin-bottom: 25px; }
        input { width: 100%; padding: 14px; margin-bottom: 20px; border-radius: 10px; border: 1px solid #333; background: #000; color: #fff; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); }
        .btn-group { display: flex; gap: 12px; }
        button { flex: 1; padding: 14px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 15px; }
        .mp4 { background: var(--primary); color: #fff; }
        .mp3 { background: #333; color: #fff; }
        button:hover { opacity: 0.9; transform: scale(0.98); }
        #status { margin-top: 25px; min-height: 40px; }
        .error-box { color: #ff4d4d; background: rgba(255, 77, 77, 0.1); padding: 10px; border-radius: 8px; font-size: 13px; }
        .success-box { color: #2ecc71; font-weight: bold; }
        .loader { display: none; border: 3px solid #222; border-top: 3px solid var(--primary); border-radius: 50%; width: 25px; height: 25px; animation: spin 1s linear infinite; margin: 15px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .dl-link { display: inline-block; margin-top: 15px; padding: 12px 25px; background: #2ecc71; color: #fff; text-decoration: none; border-radius: 8px; font-weight: bold; width: 100%; box-sizing: border-box; }
    </style>
</head>
<body>
    <div class="card">
        <h2>YT Downloader</h2>
        <p>ভিডিওর লিঙ্ক দিয়ে ডাউনলোড বাটনে ক্লিক করুন</p>
        
        <input type="text" id="urlInput" placeholder="লিঙ্ক এখানে পেস্ট করুন...">
        
        <div class="btn-group">
            <button class="mp4" onclick="handleDownload('mp4')">Video (MP4)</button>
            <button class="mp3" onclick="handleDownload('mp3')">Audio (MP3)</button>
        </div>

        <div class="loader" id="loader"></div>
        <div id="status"></div>
    </div>

    <script>
        async function handleDownload(mode) {
            const url = document.getElementById('urlInput').value;
            const status = document.getElementById('status');
            const loader = document.getElementById('loader');

            if (!url) {
                status.innerHTML = '<div class="error-box">দয়া করে একটি সঠিক লিঙ্ক দিন!</div>';
                return;
            }

            status.innerHTML = "সার্ভার চেক করা হচ্ছে...";
            loader.style.display = "block";

            try {
                const response = await fetch('/download', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: url, mode: mode })
                });

                const result = await response.json();

                if (result.success) {
                    status.innerHTML = `
                        <div class="success-box">ফাইল রেডি!</div>
                        <a href="${result.download_url}" target="_blank" class="dl-link" download>Download Now</a>
                        <p style="font-size: 11px; margin-top: 8px;">(যদি ডাউনলোড শুরু না হয়, বাটনে চেপে ধরে "Save Link" দিন)</p>
                    `;
                } else {
                    status.innerHTML = `<div class="error-box">এরর: ${result.error}</div>`;
                }
            } catch (err) {
                status.innerHTML = '<div class="error-box">সার্ভারের সাথে কানেক্ট করা যাচ্ছে না। আবার চেষ্টা করুন।</div>';
            } finally {
                loader.style.display = "none";
            }
        }
    </script>
</body>
</html>
